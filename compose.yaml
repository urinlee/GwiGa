services:
  postgres:
    image: postgres:16-alpine
    container_name: gwiga-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gwiga}
      POSTGRES_USER: ${POSTGRES_USER:-gwiga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gwiga_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gwiga} -d ${POSTGRES_DB:-gwiga}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
